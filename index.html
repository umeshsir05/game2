<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>🎮 twin puzzle · AI levels + memory</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
    }

    /* LIGHT mode (default) */
    :root {
      --bg-page: #f5f7fa;
      --surface: #ffffff;
      --card-bg: #f0f3f8;
      --text: #1e2b3c;
      --text-soft: #2c3e50;
      --border: #cbd5e0;
      --accent: #3b82f6;
      --accent-light: #dbeafe;
      --cell-bg: #ffffff;
      --cell-hover: #e6edf5;
      --memory-card: #ffffff;
      --memory-matched: #a5d6a7;
      --shadow: rgba(0, 0, 0, 0.05) 0 6px 12px;
      --toggle-bg: #e2e8f0;
      --toggle-fg: #1e293b;
    }

    /* DARK mode */
    body.dark {
      --bg-page: #0b1120;
      --surface: #1e293b;
      --card-bg: #2d3a4f;
      --text: #e9edf2;
      --text-soft: #cbd5e1;
      --border: #3f4e67;
      --accent: #60a5fa;
      --accent-light: #1e3a5f;
      --cell-bg: #263445;
      --cell-hover: #324a62;
      --memory-card: #2d3a4f;
      --memory-matched: #1f5a3a;
      --shadow: rgba(0, 0, 0, 0.6) 0 8px 16px;
      --toggle-bg: #334155;
      --toggle-fg: #f1f5f9;
    }

    body {
      background-color: var(--bg-page);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.75rem;
    }

    .game-hub {
      max-width: 650px;
      width: 100%;
      background: var(--surface);
      border-radius: 2.5rem 2.5rem 2rem 2rem;
      box-shadow: var(--shadow);
      padding: 1.5rem 1.2rem 2rem;
      border: 1px solid var(--border);
    }

    /* header + toggle menu + dark mode */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(145deg, var(--accent), #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .menu-dark-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--card-bg);
      padding: 0.4rem 0.4rem 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid var(--border);
    }

    /* toggle menu (game switch) */
    .toggle-switch {
      display: flex;
      background: var(--toggle-bg);
      border-radius: 40px;
      padding: 0.2rem;
    }

    .toggle-btn {
      border: none;
      background: transparent;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 30px;
      color: var(--text-soft);
      cursor: pointer;
      transition: 0.15s;
      min-width: 100px;
      letter-spacing: 0.3px;
    }

    .toggle-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px rgba(59,130,246,0.5);
    }

    /* dark mode icon button */
    #darkToggle {
      background: var(--toggle-bg);
      border: none;
      font-size: 1.6rem;
      line-height: 1;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--toggle-fg);
      transition: 0.2s;
      border: 1px solid var(--border);
    }

    #darkToggle:hover {
      background: var(--accent-light);
    }

    /* game container */
    .game-panel {
      background: var(--card-bg);
      border-radius: 2rem;
      padding: 1.5rem 1rem;
      border: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    /* Tic Tac Toe board + vs option + levels */
    .mode-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .mode-btn, .level-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .mode-btn.active-mode, .level-btn.active-level {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .level-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin: 0.8rem 0 0.2rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 340px;
      margin: 1.5rem auto;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background-color: var(--cell-bg);
      border: 2px solid var(--border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: 600;
      color: var(--accent);
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
      transition: 0.1s;
      cursor: pointer;
      user-select: none;
    }

    .cell:active {
      transform: scale(0.96);
    }

    .cell.taken {
      cursor: default;
    }

    .status {
      font-size: 1.3rem;
      font-weight: 500;
      text-align: center;
      margin: 15px 0 10px;
    }

    .reset-btn {
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 40px;
      display: block;
      margin: 1.2rem auto 0.5rem;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(59,130,246,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* MEMORY GAME */
    .memory-stats {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: 600;
      background: var(--surface);
      padding: 0.7rem 1.2rem;
      border-radius: 40px;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 1rem 0;
    }

    .memory-card {
      aspect-ratio: 1 / 1;
      background: var(--memory-card);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
      border: 2px solid var(--border);
      transform-style: preserve-3d;
    }

    .memory-card.matched {
      background: var(--memory-matched);
      color: white;
      border-color: #2e7d32;
      cursor: default;
      opacity: 0.8;
      transform: scale(0.98);
    }

    .memory-card.flipped {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .memory-card:active:not(.matched):not(.flipped) {
      transform: scale(0.92);
    }

    /* hide game sections with toggle */
    .game-section {
      display: none;
    }

    .game-section.active-section {
      display: block;
    }

    /* responsive */
    @media (max-width: 500px) {
      .game-hub { padding: 1rem 0.8rem; }
      h1 { font-size: 1.6rem; }
      .toggle-btn { padding: 0.5rem 0.8rem; min-width: 75px; }
      .memory-grid { gap: 8px; }
      .cell { font-size: 2.8rem; }
      .board { max-width: 280px; }
      .mode-btn, .level-btn { padding: 0.3rem 0.9rem; }
    }

    @media (max-width: 380px) {
      .header-row { flex-direction: column; align-items: stretch; }
      .menu-dark-wrapper { justify-content: space-between; }
    }

    footer {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: var(--text-soft);
    }
  </style>
</head>
<body>
  <div class="game-hub">
    <!-- header with toggle menu + dark mode toggle -->
    <div class="header-row">
      <h1>🎲 PUZZLE DUAL</h1>
      <div class="menu-dark-wrapper">
        <div class="toggle-switch" id="gameToggleMenu">
          <button class="toggle-btn active" data-game="tictactoe">✖️ TicTac</button>
          <button class="toggle-btn" data-game="memory">🧠 Memory</button>
        </div>
        <button id="darkToggle" aria-label="dark mode toggle">🌙</button>
      </div>
    </div>

    <!-- Tic Tac Toe section (with mode + levels) -->
    <div id="tictactoe" class="game-panel game-section active-section">
      <!-- mode toggles -->
      <div class="mode-row">
        <button class="mode-btn active-mode" id="mode2player">👥 2 player</button>
        <button class="mode-btn" id="modeVsCom">🤖 vs computer</button>
      </div>
      <!-- level selector (visible only in vs computer) -->
      <div class="level-selector" id="levelSelector" style="display: none;">
        <button class="level-btn" data-level="easy">🌱 Easy</button>
        <button class="level-btn active-level" data-level="medium">⚖️ Medium</button>
        <button class="level-btn" data-level="hard">💪 Hard</button>
      </div>

      <div class="status" id="ttt-status">Player X's turn</div>
      <div class="board" id="board">
        <!-- 9 cells generated in js -->
      </div>
      <button class="reset-btn" id="resetTTT">↻ New game</button>
    </div>

    <!-- Memory section -->
    <div id="memory" class="game-panel game-section">
      <div class="memory-stats">
        <span>⭐ matches <span id="matchCount">0</span>/8</span>
        <span>⏱️ attempts <span id="attemptCount">0</span></span>
      </div>
      <div class="memory-grid" id="memoryGrid"></div>
      <button class="reset-btn" id="resetMemory">🔄 shuffle & reset</button>
    </div>
    <footer>tap cards · choose level · have fun</footer>
  </div>

  <script>
    (function() {
      // ----- DARK MODE -----
      const darkToggle = document.getElementById('darkToggle');
      const body = document.body;
      if (localStorage.getItem('darkTheme') === 'enabled') {
        body.classList.add('dark');
        darkToggle.textContent = '☀️';
      } else {
        darkToggle.textContent = '🌙';
      }

      darkToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        if (body.classList.contains('dark')) {
          localStorage.setItem('darkTheme', 'enabled');
          darkToggle.textContent = '☀️';
        } else {
          localStorage.setItem('darkTheme', null);
          darkToggle.textContent = '🌙';
        }
      });

      // ----- TOGGLE MENU (switch games) -----
      const toggleBtns = document.querySelectorAll('.toggle-btn');
      const sections = {
        tictactoe: document.getElementById('tictactoe'),
        memory: document.getElementById('memory')
      };

      toggleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          toggleBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const gameId = btn.dataset.game;
          Object.keys(sections).forEach(id => {
            if (id === gameId) {
              sections[id].classList.add('active-section');
            } else {
              sections[id].classList.remove('active-section');
            }
          });
        });
      });

      // ----- TIC TAC TOE with difficulty levels -----
      const boardEl = document.getElementById('board');
      const tttStatus = document.getElementById('ttt-status');
      const resetTTT = document.getElementById('resetTTT');
      const mode2playerBtn = document.getElementById('mode2player');
      const modeVsComBtn = document.getElementById('modeVsCom');
      const levelSelectorDiv = document.getElementById('levelSelector');
      const levelBtns = document.querySelectorAll('.level-btn');

      let tttBoard = ['', '', '', '', '', '', '', '', ''];
      let currentPlayer = 'X';      // X always starts (human)
      let gameActive = true;
      let vsComputer = false;
      let difficulty = 'medium';     // default

      // highlight active mode and show/hide level selector
      function setActiveMode(mode) {
        if (mode === '2player') {
          mode2playerBtn.classList.add('active-mode');
          modeVsComBtn.classList.remove('active-mode');
          vsComputer = false;
          levelSelectorDiv.style.display = 'none';
        } else {
          modeVsComBtn.classList.add('active-mode');
          mode2playerBtn.classList.remove('active-mode');
          vsComputer = true;
          levelSelectorDiv.style.display = 'flex';
        }
        resetTicTacToe(); 
      }

      mode2playerBtn.addEventListener('click', () => setActiveMode('2player'));
      modeVsComBtn.addEventListener('click', () => setActiveMode('vsCom'));

      // difficulty click handler
      levelBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          levelBtns.forEach(b => b.classList.remove('active-level'));
          btn.classList.add('active-level');
          difficulty = btn.dataset.level; // 'easy', 'medium', 'hard'
          resetTicTacToe(); // restart game on level change (fresh board)
        });
      });

      function renderBoard() {
        let html = '';
        tttBoard.forEach((value, index) => {
          html += `<div class="cell ${value ? 'taken' : ''}" data-index="${index}">${value}</div>`;
        });
        boardEl.innerHTML = html;
      }

      function checkWinner() {
        const winPatterns = [
          [0,1,2],[3,4,5],[6,7,8],
          [0,3,6],[1,4,7],[2,5,8],
          [0,4,8],[2,4,6]
        ];
        for (let pattern of winPatterns) {
          const [a,b,c] = pattern;
          if (tttBoard[a] && tttBoard[a] === tttBoard[b] && tttBoard[a] === tttBoard[c]) {
            return tttBoard[a];
          }
        }
        if (tttBoard.every(cell => cell !== '')) return 'tie';
        return null;
      }

      function updateStatus() {
        const winner = checkWinner();
        if (winner === 'X') tttStatus.textContent = '✨ X wins! ✨';
        else if (winner === 'O') tttStatus.textContent = '✨ O wins! ✨';
        else if (winner === 'tie') tttStatus.textContent = '😲 tie game!';
        else {
          if (vsComputer) {
            tttStatus.textContent = currentPlayer === 'X' ? "🧑 Your turn (X)" : "🤖 Computer thinking...";
          } else {
            tttStatus.textContent = `Player ${currentPlayer}'s turn`;
          }
        }
      }

      // ---------- AI MOVE (easy / medium / hard) ----------
      function getEmptyIndices() {
        return tttBoard.reduce((acc, cell, idx) => cell === '' ? [...acc, idx] : acc, []);
      }

      // minimax for hard level (unbeatable)
      function minimax(board, depth, isMaximizing) {
        const winner = checkWinner(); // works on current board
        if (winner === 'O') return 10 - depth; // AI is O
        if (winner === 'X') return depth - 10; // human is X
        if (winner === 'tie') return 0;

        if (isMaximizing) {
          let best = -Infinity;
          for (let i = 0; i < 9; i++) {
            if (board[i] === '') {
              board[i] = 'O';
              let score = minimax(board, depth + 1, false);
              board[i] = '';
              best = Math.max(score, best);
            }
          }
          return best;
        } else {
          let best = Infinity;
          for (let i = 0; i < 9; i++) {
            if (board[i] === '') {
              board[i] = 'X';
              let score = minimax(board, depth + 1, true);
              board[i] = '';
              best = Math.min(score, best);
            }
          }
          return best;
        }
      }

      function getHardMove() {
        let bestScore = -Infinity;
        let bestMove = null;
        for (let i = 0; i < 9; i++) {
          if (tttBoard[i] === '') {
            tttBoard[i] = 'O';
            let moveScore = minimax(tttBoard, 0, false);
            tttBoard[i] = '';
            if (moveScore > bestScore) {
              bestScore = moveScore;
              bestMove = i;
            }
          }
        }
        return bestMove;
      }

      function computerMove() {
        if (!gameActive || currentPlayer !== 'O' || !vsComputer) return;

        let emptyIndices = getEmptyIndices();
        if (emptyIndices.length === 0) return;

        let moveIndex = null;

        if (difficulty === 'easy') {
          // easy: random among empty (very weak)
          moveIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        } 
        else if (difficulty === 'medium') {
          // medium: 50% optimal (prefer center/corners) else random
          if (Math.random() < 0.5) {
            // smartish
            if (emptyIndices.includes(4)) moveIndex = 4;
            else {
              const corners = [0,2,6,8].filter(i => emptyIndices.includes(i));
              if (corners.length > 0) {
                moveIndex = corners[Math.floor(Math.random() * corners.length)];
              } else {
                moveIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
              }
            }
          } else {
            moveIndex = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
          }
        } 
        else { // hard: perfect minimax
          moveIndex = getHardMove();
          if (moveIndex === null) moveIndex = emptyIndices[0]; // fallback
        }

        // make move after short delay
        setTimeout(() => {
          if (!gameActive || currentPlayer !== 'O') return; 
          tttBoard[moveIndex] = 'O';
          const winner = checkWinner();
          if (winner) {
            gameActive = false;
            renderBoard();
            updateStatus();
            return;
          }
          currentPlayer = 'X';
          renderBoard();
          updateStatus();
        }, 260);
      }

      function handleCellClick(e) {
        const cell = e.target.closest('.cell');
        if (!cell || !cell.dataset.index) return;
        const index = parseInt(cell.dataset.index);
        if (!gameActive || tttBoard[index] !== '') return;

        // In vs computer, only allow clicks when it's X (human)
        if (vsComputer && currentPlayer !== 'X') return;

        // human move (X)
        tttBoard[index] = 'X';
        const winner = checkWinner();
        if (winner) {
          gameActive = false;
          renderBoard();
          updateStatus();
          return;
        }

        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        renderBoard();
        updateStatus();

        // if vs computer and active and it's O turn, call computer
        if (vsComputer && gameActive && currentPlayer === 'O') {
          computerMove();
        }
      }

      boardEl.addEventListener('click', handleCellClick);

      function resetTicTacToe() {
        tttBoard = ['', '', '', '', '', '', '', '', ''];
        currentPlayer = 'X';
        gameActive = true;
        renderBoard();
        updateStatus();
      }

      resetTTT.addEventListener('click', resetTicTacToe);

      // initial ttt render
      renderBoard();
      updateStatus();

      // ----- MEMORY GAME (unchanged) -----
      const memoryGrid = document.getElementById('memoryGrid');
      const matchSpan = document.getElementById('matchCount');
      const attemptSpan = document.getElementById('attemptCount');
      const resetMemory = document.getElementById('resetMemory');

      const emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼'];
      let cards = [];
      let flippedIndices = [];
      let matchedPairs = 0;
      let attempts = 0;
      let lockBoard = false;

      function initMemory() {
        let deck = [...emojis, ...emojis];
        for (let i = deck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        cards = deck.map((emoji, idx) => ({
          id: idx,
          emoji: emoji,
          matched: false,
          flipped: false
        }));
        flippedIndices = [];
        matchedPairs = 0;
        attempts = 0;
        lockBoard = false;
        updateMemoryUI();
      }

      function updateMemoryUI() {
        let html = '';
        cards.forEach((card, idx) => {
          let classes = 'memory-card';
          if (card.matched) classes += ' matched';
          if (card.flipped && !card.matched) classes += ' flipped';
          html += `<div class="${classes}" data-index="${idx}">${card.flipped || card.matched ? card.emoji : '❓'}</div>`;
        });
        memoryGrid.innerHTML = html;
        matchSpan.textContent = matchedPairs;
        attemptSpan.textContent = attempts;
      }

      function matchCheck() {
        const [i1, i2] = flippedIndices;
        const card1 = cards[i1];
        const card2 = cards[i2];

        if (card1.emoji === card2.emoji) {
          card1.matched = true;
          card2.matched = true;
          matchedPairs++;
          card1.flipped = false;
          card2.flipped = false;
          flippedIndices = [];
          updateMemoryUI();
          if (matchedPairs === emojis.length) {
            setTimeout(() => alert('🎉 YOU WIN! perfect memory!'), 100);
          }
        } else {
          lockBoard = true;
          setTimeout(() => {
            card1.flipped = false;
            card2.flipped = false;
            flippedIndices = [];
            lockBoard = false;
            updateMemoryUI();
          }, 700);
        }
        attemptSpan.textContent = attempts;
      }

      function handleMemoryClick(e) {
        const cardDiv = e.target.closest('.memory-card');
        if (!cardDiv) return;
        const index = parseInt(cardDiv.dataset.index);
        if (isNaN(index)) return;
        const card = cards[index];

        if (lockBoard || card.matched || card.flipped) return;
        if (flippedIndices.length === 2) return;

        card.flipped = true;
        flippedIndices.push(index);
        updateMemoryUI();

        if (flippedIndices.length === 2) {
          attempts++;
          attemptSpan.textContent = attempts;
          matchCheck();
        }
      }

      memoryGrid.addEventListener('click', handleMemoryClick);
      resetMemory.addEventListener('click', initMemory);

      initMemory();
    })();
  </script>
</body>
</html>
